<html><head><meta charset="UTF-8"><link rel="import" href="../../shared-bundle.html"></head><body><dom-module id="pf-dialog">

  <style is="custom-style" include="iron-flex iron-flex-alignment">
    :host {
      display: block;
    }

  </style>

  <template>

    <paper-dialog id="dialog" class="flex">

      <p>
      <paper-icon-button dialog-dismiss="" icon="arrow-back"></paper-icon-button>
      </p>
      <paper-card id="image">
      </paper-card>

    </paper-dialog>

  </template>

  <script>Polymer({is:"pf-dialog",properties:{},open:function(i){this.$.image.image=i,this.$.dialog.open()}});</script>

</dom-module>
</body></html>
