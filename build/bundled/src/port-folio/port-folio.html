<html><head><meta charset="UTF-8"><link rel="import" href="../../shared-bundle.html"></head><body><div hidden="" by-vulcanize=""><style is="custom-style">

  body {
    @apply(--paper-font-common-base);
    font-size: 14px;
    margin: 0;
    padding: 24px;
    background-color: var(--paper-grey-50);
  }

  .horizontal-section-container {
    @apply(--layout-horizontal);
    @apply(--layout-center-justified);
    @apply(--layout-wrap);
  }

  .vertical-section-container {
    @apply(--layout-vertical);
    @apply(--center-justified);
  }

  .horizontal-section {
    background-color: white;
    padding: 24px;
    margin-right: 24px;
    min-width: 200px;

    @apply(--shadow-elevation-2dp);
  }

  .vertical-section {
    background-color: white;
    padding: 24px;
    margin: 0 24px 24px 24px;

    @apply(--shadow-elevation-2dp);
  }

  .centered {
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }

  code {
    color: var(--google-grey-700);
  }

  /* TODO: remove this hack and use horizontal-section-container instead */
  body > div.layout.horizontal.center-justified {
    @apply(--layout-wrap);
  }

</style>
<dom-module id="paper-toolbar" assetpath="../../bower_components/paper-toolbar/">
  <template>
    <style>
      :host {
        --calculated-paper-toolbar-height: var(--paper-toolbar-height, 64px);
        --calculated-paper-toolbar-sm-height: var(--paper-toolbar-sm-height, 56px);

        /* technical */
        display: block;
        position: relative;
        box-sizing: border-box;
        -moz-box-sizing: border-box;

        /* size */
        height: var(--calculated-paper-toolbar-height);

        background: var(--paper-toolbar-background, --primary-color);
        color: var(--paper-toolbar-color, --dark-theme-text-color);

        @apply(--paper-toolbar);
      }

      :host(.animate) {
        /* transition */
        transition: var(--paper-toolbar-transition, height 0.18s ease-in);
      }

      :host(.medium-tall) {
        height: calc(var(--calculated-paper-toolbar-height) * 2);
        @apply(--paper-toolbar-medium);
      }

      :host(.tall) {
        height: calc(var(--calculated-paper-toolbar-height) * 3);
        @apply(--paper-toolbar-tall);
      }

      .toolbar-tools {
        position: relative;
        height: var(--calculated-paper-toolbar-height);
        padding: 0 16px;
        pointer-events: none;
        @apply(--layout-horizontal);
        @apply(--layout-center);
        @apply(--paper-toolbar-content);
      }

      /*
       * TODO: Where should media query breakpoints live so they can be shared between elements?
       */

      @media (max-width: 600px) {
        :host {
          height: var(--calculated-paper-toolbar-sm-height);
        }

        :host(.medium-tall) {
          height: calc(var(--calculated-paper-toolbar-sm-height) * 2);
        }

        :host(.tall) {
          height: calc(var(--calculated-paper-toolbar-sm-height) * 3);
        }

        .toolbar-tools {
          height: var(--calculated-paper-toolbar-sm-height);
        }
      }

      #topBar {
        position: relative;
      }

      /* middle bar */
      #middleBar {
        position: absolute;
        top: 0;
        right: 0;
        left: 0;
      }

      :host(.tall) #middleBar,
      :host(.medium-tall) #middleBar {
        -webkit-transform: translateY(100%);
        transform: translateY(100%);
      }

      /* bottom bar */
      #bottomBar {
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
      }

      /*
       * make elements (e.g. buttons) respond to mouse/touch events
       *
       * `.toolbar-tools` disables touch events so multiple toolbars can stack and not
       * absorb events. All children must have pointer events re-enabled to work as
       * expected.
       */
      .toolbar-tools > ::content > *:not([disabled]) {
        pointer-events: auto;
      }

      .toolbar-tools > ::content .title {
        @apply(--paper-font-common-base);

        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-size: 20px;
        font-weight: 400;
        line-height: 1;
        pointer-events: none;

        @apply(--layout-flex);
      }

      .toolbar-tools > ::content > .title {
        margin-left: 56px;
      }

      .toolbar-tools > ::content > paper-icon-button + .title {
        margin-left: 0;
      }

      /**
       * The --paper-toolbar-title mixin is applied here instead of above to
       * fix the issue with margin-left being ignored due to css ordering.
       */
      .toolbar-tools > ::content .title {
        @apply(--paper-toolbar-title);
      }

      .toolbar-tools > ::content paper-icon-button[icon=menu] {
        margin-right: 24px;
      }

      .toolbar-tools > ::content > .fit {
        position: absolute;
        top: auto;
        right: 0;
        bottom: 0;
        left: 0;
        width: auto;
        margin: 0;
      }

      /* TODO(noms): Until we have a better solution for classes that don't use
       * /deep/ create our own.
       */
      .start-justified {
        @apply(--layout-start-justified);
      }

      .center-justified {
        @apply(--layout-center-justified);
      }

      .end-justified {
        @apply(--layout-end-justified);
      }

      .around-justified {
        @apply(--layout-around-justified);
      }

      .justified {
        @apply(--layout-justified);
      }
    </style>

    <div id="topBar" class$="toolbar-tools [[_computeBarExtraClasses(justify)]]">
      <content select=":not(.middle):not(.bottom)"></content>
    </div>

    <div id="middleBar" class$="toolbar-tools [[_computeBarExtraClasses(middleJustify)]]">
      <content select=".middle"></content>
    </div>

    <div id="bottomBar" class$="toolbar-tools [[_computeBarExtraClasses(bottomJustify)]]">
      <content select=".bottom"></content>
    </div>
  </template>

<dom-module id="paper-drawer-panel" assetpath="../../bower_components/paper-drawer-panel/">
  <template>
    <style>
      :host {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      iron-selector > #drawer {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        background-color: white;

        -moz-box-sizing: border-box;
        box-sizing: border-box;

        @apply(--paper-drawer-panel-drawer-container);
      }

      .transition > #drawer {
        transition: -webkit-transform ease-in-out 0.3s, width ease-in-out 0.3s, visibility 0.3s;
        transition: transform ease-in-out 0.3s, width ease-in-out 0.3s, visibility 0.3s;
      }

      .left-drawer > #drawer {
        @apply(--paper-drawer-panel-left-drawer-container);
      }

      .right-drawer > #drawer {
        left: auto;
        right: 0;

        @apply(--paper-drawer-panel-right-drawer-container);
      }

      iron-selector > #main {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;

        @apply(--paper-drawer-panel-main-container);
      }

      .transition > #main {
        transition: left ease-in-out 0.3s, padding ease-in-out 0.3s;
      }

      .right-drawer > #main {
        left: 0;
      }

      .right-drawer.transition > #main {
        transition: right ease-in-out 0.3s, padding ease-in-out 0.3s;
      }

      #main > ::content > [main] {
        height: 100%;
      }

      #drawer > ::content > [drawer] {
        height: 100%;
      }

      #scrim {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        visibility: hidden;
        opacity: 0;
        transition: opacity ease-in-out 0.38s, visibility ease-in-out 0.38s;
        background-color: rgba(0, 0, 0, 0.3);

        @apply(--paper-drawer-panel-scrim);
      }

      .narrow-layout > #drawer {
        will-change: transform;
      }

      .narrow-layout > #drawer.iron-selected {
        box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.15);
      }

      .right-drawer.narrow-layout > #drawer.iron-selected {
        box-shadow: -2px 2px 4px rgba(0, 0, 0, 0.15);
      }

      .narrow-layout > #drawer > ::content > [drawer] {
        border: 0;
      }

      .left-drawer.narrow-layout > #drawer:not(.iron-selected) {
        visibility: hidden;

        -webkit-transform: translateX(-100%);
        transform: translateX(-100%);
      }

      .right-drawer.narrow-layout > #drawer:not(.iron-selected) {
        left: auto;
        visibility: hidden;

        -webkit-transform: translateX(100%);
        transform: translateX(100%);
      }

      .left-drawer.dragging > #drawer:not(.iron-selected),
      .left-drawer.peeking > #drawer:not(.iron-selected),
      .right-drawer.dragging > #drawer:not(.iron-selected),
      .right-drawer.peeking > #drawer:not(.iron-selected) {
        visibility: visible;
      }

      .narrow-layout > #main {
        padding: 0;
      }

      .right-drawer.narrow-layout > #main {
        left: 0;
        right: 0;
      }

      .narrow-layout > #main:not(.iron-selected) > #scrim,
      .dragging > #main > #scrim {
        visibility: visible;
        opacity: var(--paper-drawer-panel-scrim-opacity, 1);
      }

      .narrow-layout > #main > * {
        margin: 0;
        min-height: 100%;
        left: 0;
        right: 0;

        -moz-box-sizing: border-box;
        box-sizing: border-box;
      }

      iron-selector:not(.narrow-layout) ::content [paper-drawer-toggle] {
        display: none;
      }
    </style>

    <iron-media-query id="mq" on-query-matches-changed="_onQueryMatchesChanged" query="[[_computeMediaQuery(forceNarrow, responsiveWidth)]]">
    </iron-media-query>

    <iron-selector attr-for-selected="id" class$="[[_computeIronSelectorClass(narrow, _transition, dragging, rightDrawer, peeking)]]" activate-event="" selected="[[selected]]">

      <div id="main" style$="[[_computeMainStyle(narrow, rightDrawer, drawerWidth)]]">
        <content select="[main]"></content>
        <div id="scrim" on-tap="closeDrawer"></div>
      </div>

      <div id="drawer" style$="[[_computeDrawerStyle(drawerWidth)]]">
        <content id="drawerContent" select="[drawer]"></content>
      </div>

    </iron-selector>
  </template>

  <template>
    <style>
      :host {
        @apply(--layout-vertical);

        position: relative;
        height: 100%;

        @apply(--paper-header-panel);
      }

      #mainContainer {
        @apply(--layout-flex);

        position: relative;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }

      #mainPanel {
        @apply(--layout-vertical);
        @apply(--layout-flex);

        position: relative;
        min-height: 0;

        @apply(--paper-header-panel-body);
      }

      /*
       * mode: scroll
       */
      :host([mode=scroll]) #mainContainer {
        @apply(--paper-header-panel-scroll-container);

        overflow: visible;
      }

      :host([mode=scroll]) {
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }

      /*
       * mode: cover
       */
      :host([mode=cover]) #mainContainer {
        @apply(--paper-header-panel-cover-container);

        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
      }

      :host([mode=cover]) #mainPanel {
        position: static;
      }

      /*
       * mode: standard
       */
      :host([mode=standard]) #mainContainer {
        @apply(--paper-header-panel-standard-container);
      }

      /*
       * mode: seamed
       */
      :host([mode=seamed]) #mainContainer {
        @apply(--paper-header-panel-seamed-container);
      }


      /*
       * mode: waterfall
       */
      :host([mode=waterfall]) #mainContainer {
        @apply(--paper-header-panel-waterfall-container);
      }

      /*
       * mode: waterfall-tall
       */
      :host([mode=waterfall-tall]) #mainContainer {
        @apply(--paper-header-panel-waterfall-tall-container);
      }

      #dropShadow {
        transition: opacity 0.5s;
        height: 6px;
        box-shadow: inset 0px 5px 6px -3px rgba(0, 0, 0, 0.4);

        @apply(--paper-header-panel-shadow);

        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        opacity: 0;
        pointer-events: none;
      }

      #dropShadow.has-shadow {
        opacity: 1;
      }
    </style>

    <content id="headerContent" select="paper-toolbar, .paper-header"></content>

    </div>

            <h3><iron-icon icon="check"></iron-icon>My last internship experience showed that I am capable of handling sensitive situations, </h3>

<dom-module id="pf-projects" assetpath="../pf-projects/">

  <style is="custom-style" include="iron-flex iron-flex-alignment">
    :host {
      display: block;
    }

  </style>

  <style>
    paper-card {
      width: 45%;
      min-width: 275px;
      margin: 10px;
      padding: 20px;
    }

  </style>


  <style is="custom-style">

      --paper-card-header-color: #fff;
    };
  </style>

  <template>


    <app-location route="{{route}}"></app-location>

    <pf-dialog id="pfDialog"></pf-dialog>


      <paper-card heading="VR 3D World builder" elevation="2" image="../resources/vive.jpg">
        <div class="card-content">
          <div class="card-actions">
            <paper-toggle-button checked="{{collapseVr3dBuilder}}">See all</paper-toggle-button>
          </div>
          <h2>Coming soon...</h2>
          <h3>3D world builder with Unity3D, HTC Vive compatible.</h3>

          <iron-collapse opened="{{collapseVr3dBuilder}}">

            <p>With a student team from <strong>ESIEA</strong>, we will develop a <strong>3D castle builder</strong> using <strong><a href="https://unity3d.com/" target="_blank">Unity3D</a></strong>
            and <strong><a href="http://www.vive.com/fr/" target="_blank">HTC Vive</a></strong> compatible.
            At the end, the goal is to add interaction like protecting the castle against enemies, for example.
            Please come back a little bit later in order to get news about this project !
            </p>
          </iron-collapse>
        </div>

      </paper-card>

      <paper-card heading="Portfolio" elevation="2" image="../resources/polymer-logo.jpg">
        <div class="card-actions">
          <paper-toggle-button checked="{{collapsePortfolio}}">See all</paper-toggle-button>
        </div>
        <div class="content">
          <h2>October 2016 - Now</h2>

          <h3>This is indeed the actual website you are using right now.</h3>

          <iron-collapse opened="{{collapsePortfolio}}">

            <p>For me, it is a real project, because
            I took the challenge to use <strong><a href="https://www.polymer-project.org/1.0/" target="_blank">Polymer</a></strong>, a Google framework, in order to quickly develop a stable website, instead
            of just set up a Wordpress.
            </p>

            <h3>What is Polymer ?</h3>
            <p>This is a web components based framework designed by a Google team.</p>
            <p><strong>What is important to keep in mind about this framework ?</strong></p>
            <ul>
              <li><h4>The Material Design</h4>
                <p>This is the Google graphical charter, allowing a unique and clean design.
                You can see the official documentation <strong><a href="https://material.google.com/" target="_blank">here</a></strong>
                </p>
              </li>

              <li><h4>The web components compatibility</h4>
                <p>Google bet the web components will be the next standard for the web.
                According to this statement, Polymer is trying to use the maximum of the concept of web components.
                Obvously, a new standard means an great cross-browser compatibility.
                You can get more informations about web components on the <strong><a href="http://webcomponents.org/" target="_blank">Official website</a></strong>
                </p>
              </li>

              <li><h4>The web application concept</h4>
                <p>Polymer is thought to build web applications, wich means that the website will be highly interactive, and the possibilities look
                  like you are building a native application, but for the web</p>
              </li>
            </ul>

            <h3>Why using Polymer ?</h3>
            <p>
            Indeed, Polymer is quite good if you want a clean and stable appareance for your website. Then, it is a good solution
            to make this website easily sustainable. Actually, this portfolio is only a matter of HTML, CSS and JavaScript for now,
            but this is because I wanted to quickly set up my portfolio. In the future, I plan to migrate the hard-coded data of this
            to a database. At this point, the powerness of Polymer will make sense in this context.
            </p>

            <p>I took me only one week to set up and build the global structure of this website. You can see below the git trace of this project :</p>

            <paper-card image="../../resources/git-trace.jpg">
              <h4>Git trace</h4>
              <paper-button id="../../resources/git-trace.jpg" on-tap="openDialog">
                See in fullscreen
                <iron-icon icon="fullscreen"></iron-icon>
              </paper-button>
            </paper-card>
          </iron-collapse>
        </div>
      </paper-card>

      <paper-card elevation="2" image="../resources/mcl-console.jpg">
        <h2>Administration console</h2>
        <div class="card-actions">
          <paper-toggle-button checked="{{collapseMonCoachLegumes}}">See all</paper-toggle-button>
        </div>
        <div class="card-content">
          <h2>April 2016 - August 2016</h2>

          <h3>
          Administration console for the <strong><a href="http://moncoachlegumes.fr/accueil.html" target="_blank">Mon Coach Légumes</a></strong> website, built with Polymer.
        </h3>

          <iron-collapse opened="{{collapseMonCoachLegumes}}">


            <h3>What is Mon Coach Légumes ?</h3>

            <p>Mon Coach Légumes is a service allowing everyone to be tutored while growing vegetables and fruits.
            The concept is quite simple : while you are taking care of a virtual garden, you can do the same for real, and
            get an amount of useful advices :
            </p><ul>
              <li> the plantation periods</li>
              <li>the compatibility between vegetables</li>
              <li>when water your products...</li>
            </ul>

            The ball is in your court for a succesful vegetable garden !
            <p></p>

            <paper-card image="../../resources/mon-coach-legumes-home.jpg" on-tap="openDialog">
              <h4>Mon Coach Légumes home page</h4>
              <paper-button id="../../resources/mon-coach-legumes-home.jpg" on-tap="openDialog">
                See in fullscreen
                <iron-icon icon="fullscreen"></iron-icon>
              </paper-button>
            </paper-card>

            <p>This is a website built with Polymer. So it is a Material Design website having all the qualities we discussed in the Portfolio section.</p>

            <paper-card image="../../resources/mon-coach-legumes-garden.jpg">
              <h4>Mon Coach Légumes garden page</h4>
              <paper-button id="../../resources/mon-coach-legumes-garden.jpg" on-tap="openDialog">
                See in fullscreen
                <iron-icon icon="fullscreen"></iron-icon>
              </paper-button>
            </paper-card>

            <h3>The administration console</h3>

            <p>Mon Coach Légumes was a project launched by <strong><a href="https://www.maison-et-services.com/" target="_blank">Maison et Services</a></strong> and executed by the
               <strong><a href="http://www.sfdn.eu/" target="_blank">SFDN</a></strong> company,
              where I was employed. I was designated to continue the administration console development for this website.
              This is where I learned how to use Polymer to build web applications.
            </p>

            <p>I mainly designed the calls between the user interface and the web services of Mon Coach Légumes, written in PHP. Those web services allow us to connect to the database.
              I also did some user interface and database administration.
            </p>

            <paper-card image="../../resources/mcl-console.jpg">
              <h4>The Mon Coach Légumes console</h4>
              <paper-button id="../../resources/mcl-console.jpg" on-tap="openDialog">
                See in fullscreen
                <iron-icon icon="fullscreen"></iron-icon>
              </paper-button>
            </paper-card>


            <h3>The statistics section</h3>

            <p>I fully developed a statistics section in order to track agregated data about the users (number of accounts, ...) and about how they use
              Mon Coach Légumes. In order to store the data, I simply chooe to use CSV files.
            </p>

            <paper-card image="../../resources/mcl-console-stats.jpg">
              <h4>The Mon Coach Légumes statistics section</h4>
              <paper-button id="../../resources/mcl-console-stats.jpg" on-tap="openDialog">
                See in fullscreen
                <iron-icon icon="fullscreen"></iron-icon>
              </paper-button>
            </paper-card>

            <p><strong><a href="../../resources/mcl-stats.pdf" target="_blank">Download the Powerpoint presentation about this statistics section</a></strong></p>



          </iron-collapse>
        </div>
      </paper-card>

      <paper-card heading="Forum" elevation="2" image="../resources/forum.jpg" class="white">
        <div class="card-actions">
          <paper-toggle-button checked="{{collapseForum}}">See all</paper-toggle-button>
        </div>
        <div class="card-content">
          <h2>October 2015 - December 2015</h2>

          <h3>MVC design pattern forum, fully written in HTML, CSS and PHP.</h3>
          <iron-collapse opened="{{collapseForum}}">
            <p>
            This was my first opportunity to implement a MVC design pattern in a web project.
            It is interfaced with a MySQL database.

            Here are the features :
            </p><ul>
              <li>Read, post messages on topics</li>
              <li>Create topics</li>

      <paper-card heading="Numeric Table" elevation="2" image="../resources/numeric-table.jpg">

        </div>
        <div class="card-content">
          <h2>September 2015 - June 2016</h2>

          <h3>Numeric table with RFID for the Laval Museum</h3>

          <iron-collapse opened="{{collapseNumericTable}}">
            <p>In november 2016, the Laval Museum (CCSTI) will launch an exhibition about innovation in food proccessing industry,
            and wanted an interactive numeric table as a part of this event.
          </p>

            <paper-card image="../../resources/ccsti.jpg">
              <h4><a href="http://www.ccsti-laval.org/" target="_blank">See the CCSTI website</a></h4>
            </paper-card>

            <h3>The synopsis is quite simple :</h3>
            <ul>
              <li>The user is facing a table with food, dishes, that seems to be an ordinary restaurant table</li>
              <li>He notices he can manipulate factice food on the table</li>
              <li>He puts food onto his plate</li>
              <li>An animation, starting from the plate, shows the industry steps that was necessary to have a eatable product</li>
            </ul>

            <h3>The showed data is :</h3>
            <ul>
              <li>What kind of processes the product underwent</li>
              <li>The distance runned between each processing step</li>
              <li>The carbon footprint</li>
              <li>Nutritional informations about the product</li>
            </ul>
            <p></p>

            <h4>The main goal of this project is to sensitise people about the food he is consuming.</h4>

            <h3>How does it work</h3>
            The interaction with the table is designed to be as simple as possible. The original goal was to launch animations
            when food is put onto the plate. We chose to use <strong>RFID</strong> for its simplicity and its small cost to implement.
            We ordered an <strong>Arduino</strong> board to pilot a RFID board. The board was connected by serial port to a
            computer running a Unity3D application we developed.

            <h3>Demonstration video</h3>

            <video width="100%" heigth="100%" controls="" muted="">
              <source src="../../resources/ccsti.webm" type="video/webm">
            </video>

            <a href="../../resources/ccsti.pdf" target="_blank">Download the report about this project</a>


          </iron-collapse>
        </div>

        <div class="card-actions">

        </div>
        <div class="card-content">
          <h2>November 2014 - March 2015</h2>

          <h3>Team Building VR application for Les Entrepreneuriales</h3>

          <iron-collapse opened="{{collapseImmersionNomade}}">
            <p>In a entrepreneurial context, we developed a VR Team Building project as a proof of concept, using <strong>Unity3D, Kinect and Oculus Rift</strong></p>

            <h3>How does the Team Building work in this application ?</h3>

            <p>While a person is wearing an Oculus Rift, an other is tracked by the Kinect. The first person sees the second in a virtual environment, and items are
              falling from the sky. The goal for the person who is seeing the scene is to pilot the second person by voice commands in order to catch the items.
              This is in fact a trust exercice.
            </p>

          </iron-collapse>
        </div>
