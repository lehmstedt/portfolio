<link rel="import" href="../pf-home/pf-home.html">
<link rel="import" href="../pf-projects/pf-projects.html">

<dom-module id="pf-content">

  <template>
    <style></style>

    <iron-pages id="ironpages" selected="{{route.path}}" attr-for-selected="name">
      <pf-home name="accueil" route="{{route.path}}"></pf-home>
      <pf-projects name="projets" route="{{route.path}}"></pf-projects>
  </template>

  <script>

  Polymer({

    is: 'pf-content',

    properties: {
      route: {
        type: Object,
        notify: true,
        reflectToAttribute: true
      },
    },

    ready: function(){
      document.addEventListener('iron-select', this.onIronSelect2.bind(this));
    },

    onIronSelect2 : function(){
      console.log(this.$.ironpages.selected);
    }

  });

  </script>

</dom-module>
