//APP
<link rel="import" href="../../bower_components/app-route/app-route.html">
<link rel="import" href="../../bower_components/app-route/app-location">

//ELEMENTS
<link rel="import" href="../pf-content/pf-content.html">

<dom-module id="pf-drawer-panel">

  <template>
    <style></style>

    <paper-drawer-panel>
      <paper-header-panel drawer>
        <paper-toolbar>
          <div class="title">Plan du site</div>
          <paper-icon-button icon="arrow-back" paper-drawer-toggle>
          </paper-icon-button>
        </paper-toolbar>
        <paper-listbox selected="{{route}}">
          <paper-item>
            <iron-icon icon="social:school"></iron-icon>
            Parcours scolaire
          </paper-item>
          <paper-item>
            <iron-icon icon="work"></iron-icon>
            Expérience professionelle</paper-item>
          <paper-item>
            <iron-icon icon="star"></iron-icon>
            Projets
          </paper-item>

          <paper-item>
            <iron-icon icon="social:share"></iron-icon>
            Réseaux sociaux
          </paper-icon>
        </paper-listbox>
      </paper-header-panel>

      <paper-header-panel main>
        <paper-toolbar class="tall">
          <paper-icon-button icon="menu" paper-drawer-toggle>
          </paper-icon-button>
          <div class="title">PortFolio</div>
        </paper-toolbar>
        <pf-content page="{{route}}"></pf-content>
      </paper-header-panel>
    </paper-drawer-panel>

    <app-location route="{{route}}"></app-location>
    <app-route
      route="{{route}}"
      pattern="/:page"
      data="{{data}}"
      tail="{{tail}}">
    </app-route>

  </template>

  <script>

  Polymer({

    is:'pf-drawer-panel',

    properties : {

    },



  });

  </script>
