<link rel="import" href="../../bower_components/paper-dialog/paper-dialog.html">

<dom-module id="pf-dialog">

  <style is="custom-style" include="iron-flex iron-flex-alignment">
    :host {
      display: block;
    }

  </style>

  <template>

    <paper-dialog id="dialog" class="flex">

      <p>
      <paper-icon-button dialog-dismiss icon="arrow-back"></paper-icon-button>
      </p>
      <paper-card id="image">
      </paper-card>

    </paper-dialog>

  </template>

  <script>

    Polymer({

      is: 'pf-dialog',

      properties: {

      },

      open: function(imageSrc){
        this.$.image.image = imageSrc;
        this.$.dialog.open();
      }

    });
  </script>

</dom-module>
