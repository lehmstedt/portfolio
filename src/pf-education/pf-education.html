<dom-module id="pf-education">

  <template>

    <style is="custom-style" include="iron-flex iron-flex-alignment">
      :host {
        display: block;
      }
    </style>

    <div class="vertical layout">

      <h1>Education</h1>

      <paper-button raised on-tap="collapseEsiea">
        ESIEA
        <iron-icon icon="arrow-drop-down"></iron-icon>
      </paper-button>

      <iron-collapse id="esieaCollapse" opened>
        <h2>2011 - 2017</h2>
      </iron-collapse>

      <paper-button raised on-tap="collapseBac">
        Baccalaureate
        <iron-icon icon="arrow-drop-down"></iron-icon>
      </paper-button>

      <iron-collapse id="bacCollapse">
        <h2>2011</h2>
      </iron-collapse>

    </div>

  </template>

  <script>

  Polymer({
    is: 'pf-education',

    properties: {

    },

    collapseEsiea: function(){
      this.$.esieaCollapse.toggle();
    },

    collapseBac: function(){
      this.$.bacCollapse.toggle();
    },
  });

  </script>

</dom-module>
