<link rel="import" href="../pf-education/pf-education.html">
<link rel="import" href="../pf-pro/pf-pro.html">
<link rel="import" href="../pf-networks/pf-networks.html">

<dom-module id="port-folio">
  <template>
    <style is="custom-style" include="iron-flex iron-flex-alignment">
      :host {
        display: block;
      }
    </style>

    <iron-localstorage name="localstorage"
      value="{{route.path}}">
    </iron-localstorage>

    <app-location id="location" route="[[route]]"></app-location>

    <app-route
    route="{{route}}"
    pattern="/:view"
    data="{{routeData}}"
    tail="{{subroute}}"></app-route>

    <paper-drawer-panel>
      <paper-header-panel drawer>
        <paper-toolbar class="small">
          <div class="title">Topics</div>
          <paper-icon-button icon="arrow-back" paper-drawer-toggle>
          </paper-icon-button>
        </paper-toolbar>
        <paper-listbox selected="{{route.path}}" attr-for-selected="name">

          <paper-item name="home" on-tap="changeTopic">
            <iron-icon icon="home"></iron-icon>
            Home
          </paper-item>

          <paper-item name="projects" on-tap="changeTopic">
            <iron-icon icon="star"></iron-icon>
            Projects
          </paper-item>
          <paper-item name="education" on-tap="changeTopic">
            <iron-icon icon="social:school"></iron-icon>
            Education
          </paper-item>
          <paper-item name="pro" on-tap="changeTopic">
            <iron-icon icon="work"></iron-icon>
            Professional experience</paper-item>

          <paper-item name="networks" on-tap="changeTopic">
            <iron-icon icon="social:share"></iron-icon>
            Social networks
          </paper-icon>
        </paper-listbox>
      </paper-header-panel>

      <paper-scroll-header-panel main condenses keep-condensed-header>
        <paper-toolbar class="medium-tall">
          <paper-icon-button icon="menu" paper-drawer-toggle>
          </paper-icon-button>
          <div class="title">PortFolio</div>
        </paper-toolbar>

        <iron-pages selected="{{route.path}}" attr-for-selected="name" fallback-selection="home">
          <pf-home name="home"></pf-home>
          <pf-projects name="projects"></pf-projects>
          <pf-education name="education"></pf-education>
          <pf-pro name="pro"></pf-pro>
          <pf-networks name="networks"></pf-networks>
        </iron-pages>

      </paper-scroll-header-panel>
    </paper-drawer-panel>



  </template>

  <script>
    Polymer({

      is: 'port-folio',

      properties: {
        route : {
          type : Object,
          value: function(){
            return {path: '/home', prefix: ''}
          },
          notify: true,
          reflectToAttribute: true
        },

        routeData : {
          type: Object,
          notify: true,
          reflectToAttribute: true
        },

        subroute: {
          type : Object,
          notify: true,
          reflectToAttribute: true
        }

      },

      changeTopic: function(e){
        this.set('route.path', '/' + e.srcElement.selected);
      }

    });
  </script>
</dom-module>
