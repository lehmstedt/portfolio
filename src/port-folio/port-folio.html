//ELEMENTS

<dom-module id="port-folio">
  <template>
    <style>
      :host {
        display: block;
      }
    </style>

    <app-location id="location" route="{{route}}"></app-location>

    <app-route id="approute"
      route="{{route}}"
      pattern="/:view"
      data="{{routeData}}"
      tail="{{subroute}}"></app-route>



    <paper-drawer-panel>
      <paper-header-panel drawer>
        <paper-toolbar>
          <div class="title">Topics</div>
          <paper-icon-button icon="arrow-back" paper-drawer-toggle>
          </paper-icon-button>
        </paper-toolbar>
        <paper-listbox selected="{{route.path}}" attr-for-selected="name">

          <paper-item name="home">
            <iron-icon icon="home"></iron-icon>
            Home
          </paper-item>

          <paper-item name="projects">
            <iron-icon icon="star"></iron-icon>
            Projects
          </paper-item>
          <paper-item name="school">
            <iron-icon icon="social:school"></iron-icon>
            School
          </paper-item>
          <paper-item name="work">
            <iron-icon icon="work"></iron-icon>
            Work experience</paper-item>

          <paper-item name="networks">
            <iron-icon icon="social:share"></iron-icon>
            Social networks
          </paper-icon>
        </paper-listbox>
      </paper-header-panel>

      <paper-header-panel main>
        <paper-toolbar class="medium-tall">
          <paper-icon-button icon="menu" paper-drawer-toggle>
          </paper-icon-button>
          <div class="title">PortFolio</div>
        </paper-toolbar>
        <pf-content route="{{route}}"></pf-content>
      </paper-header-panel>
    </paper-drawer-panel>

  </template>

  <script>
    Polymer({

      is: 'port-folio',

      properties: {
        route : {
          type : Object,
          value: function(){
            return {path: '/home', prefix: ''}
          },
          notify: true,
          reflectToAttribute: true
        },

      },


      ready: function(){
        document.addEventListener('iron-select', this.onIronSelect.bind(this));

      },

      onIronSelect: function(e){
        this.set('route.path', '/' + e.srcElement.selected);
      }

    });
  </script>
</dom-module>
