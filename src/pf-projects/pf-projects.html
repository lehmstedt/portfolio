<dom-module id="pf-projects">

  <style is="custom-style" include="iron-flex iron-flex-alignment">
    :host {
      display: block;
    }

  </style>

  <style>
    paper-card {
      width: 45%;
      min-width: 275px;
      margin: 10px;
      padding: 20px;
    }

  </style>


  <style is="custom-style">
    paper-card.white {
      --paper-card-header-color: #fff;
    };
  </style>

  <template>


    <app-location route="{{route}}"></app-location>

    <pf-dialog id="pfDialog"></pf-dialog>


      <paper-card heading="VR 3D Builder" elevation="2" image="../resources/vive.png">
        <div class="card-content">
          <div class="card-actions">
            <paper-toggle-button checked="{{collapseVr3dBuilder}}">See all</paper-toggle-button>
          </div>
          <h2>Coming soon...</h2>
          <p>3D castle builder with Unity3D, HTC Vive compatible</p>

          <iron-collapse opened="{{collapseVr3dBuilder}}">

            <p>With a student team from <strong>ESIEA</strong>, we will develop a <strong>3D castle builder</strong> using <strong><a href="https://unity3d.com/" target="_blank">Unity3D</a></strong>
            and <strong><a href="http://www.vive.com/fr/" target="_blank">HTC Vive</a></strong> compatible.
            At the end, the goal is to add interaction like protecting the castle against enemies, for example.
            Please come back a little bit later in order to get news about this project !
            </p>
          </iron-collapse>
        </div>

      </paper-card>

      <paper-card heading="Portfolio" elevation="2" image="../resources/polymer-logo.png">
        <div class="card-actions">
          <paper-toggle-button checked="{{collapsePortfolio}}">See all</paper-toggle-button>
        </div>
        <div class="content">
          <h2>October 2016 - Now</h2>

          <p>This is indeed the actual website you are using right now.</p>

          <iron-collapse opened="{{collapsePortfolio}}">

            <p>For me, it is a real project, because
            I took the challenge to use <strong><a href="https://www.polymer-project.org/1.0/" target="_blank">Polymer</a></strong>, a Google framework, in order to quickly develop a stable website, instead
            of just set up a Wordpress.
            </p>

            <h3>What is Polymer ?</h3>
            <p>This is a web components based framework designed by a Google team.</p>
            <p><strong>What is important to keep in mind about this framework ?</strong></p>
            <ul>
              <li><h4>The Material Design</h4>
                <p>This is the Google graphical charter, allowing a unique and clean design.
                You can see the official documentation <strong><a href="https://material.google.com/" target="_blank">here</a></strong>
                </p>
              </li>

              <li><h4>The web components compatibility</h4>
                <p>Google bet the web components will be the next standard for the web.
                According to this statement, Polymer is trying to use the maximum of the concept of web components.
                Obvously, a new standard means an great cross-browser compatibility.
                You can get more informations about web components on the <strong><a href="http://webcomponents.org/" target="_blank">Official website</a></strong>
                </p>
              </li>

              <li><h4>The web application concept</h4>
                <p>Polymer is thought to build web applications, wich means that the website will be highly interactive, and the possibilities look
                  like you are building a native application, but for the web</p>
              </li>
            </ul>

            <h3>Why using Polymer ?</h3>
            <p>
            Indeed, Polymer is quite good if you want a clean and stable appareance for your website. Then, it is a good solution
            to make this website easily sustainable. Actually, this portfolio is only a matter of HTML, CSS and JavaScript for now,
            but this is because I wanted to quickly set up my portfolio. In the future, I plan to migrate the hard-coded data of this
            to a database. At this point, the powerness of Polymer will make sense in this context.
            </p>

            <p>I took me only one week to set up and build the global structure of this website. You can see below the git trace of this project :</p>

            <paper-card image="../../resources/git-trace.png">
              <h4>Git trace</h4>
              <paper-button id="../../resources/git-trace.png" on-tap="openDialog">
                See in fullscreen
                <iron-icon icon="fullscreen"></iron-icon>
              </paper-button>
            </paper-card>
          </iron-collapse>
        </div>
      </paper-card>

      <paper-card elevation="2" image="../resources/mcl-console.png">
        <h2>Administration console</h2>
        <div class="card-actions">
          <paper-toggle-button checked="{{collapseMonCoachLegumes}}">See all</paper-toggle-button>
        </div>
        <div class="card-content">
          <h2>April 2016 - August 2016</h2>

          <p>
          Administration console for the <strong><a href="http://moncoachlegumes.fr/accueil.html" target="_blank">Mon Coach Légumes</a></strong> website, built with Polymer.
          </p>

          <iron-collapse opened="{{collapseMonCoachLegumes}}">


            <h3>What is Mon Coach Légumes ?</h3>

            <p>Mon Coach Légumes is a service giving everyone the chance to be coached in the field of growing vegetables and fruits.
            The concept is quite simple : while you a taking care of a virtual vegetable garden, you can do the same for real, and
            get an amount of useful advices, like the plantation periods, the compatibility between vegetables, when water your products...
            You get everything in order to make your vegetable garden a success !
            </p>

            <paper-card image="../../resources/mon-coach-legumes-home.png" on-tap="openDialog">
              <h4>Mon Coach Légumes home page</h4>
              <paper-button id="../../resources/mon-coach-legumes-home.png" on-tap="openDialog">
                See in fullscreen
                <iron-icon icon="fullscreen"></iron-icon>
              </paper-button>
            </paper-card>

            <p>This is a website built with Polymer. So it is a Material Design website having all the qualities we discussed in the Portfolio project section.</p>

            <paper-card image="../../resources/mon-coach-legumes-garden.png">
              <h4>Mon Coach Légumes garden page</h4>
              <paper-button id="../../resources/mon-coach-legumes-garden.png" on-tap="openDialog">
                See in fullscreen
                <iron-icon icon="fullscreen"></iron-icon>
              </paper-button>
            </paper-card>

            <h3>The administration console</h3>

            <p>Mon Coach Légumes was a project launched by <strong><a href="https://www.maison-et-services.com/" target="_blank">Maison et Services</a></strong> and executed by the
               <strong><a href="http://www.sfdn.eu/" target="_blank">SFDN</a>.</strong>
              Where I was employed in the SFDN, my objective was to continue the administration console project for this website.
              This is where I learned how to use Polymer to build web applications.
            </p>

            <p>I mainly designed the calls between the user interface and the web services of Mon Coach Légumes, written in PHP, which permits us to connect to the database.
              I also did some user interface and database administration.
            </p>

            <paper-card image="../../resources/mcl-console.png">
              <h4>The Mon Coach Légumes console</h4>
              <paper-button id="../../resources/mcl-console.png" on-tap="openDialog">
                See in fullscreen
                <iron-icon icon="fullscreen"></iron-icon>
              </paper-button>
            </paper-card>


            <h3>The statistics section</h3>

            <p>I fully developed a statistics section in order to track agregated data about the users (number of accounts, ...) and about how they use
              Mon Coach Légumes. In order to store the data, I simply choose to use CSV files.
            </p>

            <paper-card image="../../resources/mcl-console-stats.png">
              <h4>The Mon Coach Légumes statistics section</h4>
              <paper-button id="../../resources/mcl-console-stats.png" on-tap="openDialog">
                See in fullscreen
                <iron-icon icon="fullscreen"></iron-icon>
              </paper-button>
            </paper-card>

            <p><strong><a href="../../resources/mcl-stats.pptx" target='_blank'>Download the Powerpoint presentation about this statistics section</a></strong></p>



          </iron-collapse>
        </div>
      </paper-card>

      <paper-card heading="Forum" elevation="2" image="../resources/forum.png" class="white">
        <div class="card-actions">
          <paper-toggle-button checked="{{collapseForum}}">See all</paper-toggle-button>
        </div>
        <div class="card-content">
          <h2>October 2015 - December 2015</h2>

          <p>MVC design pattern forum, fully written in HTML, CSS and PHP</p>
          <iron-collapse opened="{{collapseForum}}">
            <p>
            This was my first opportunity to implement a MVC design pattern in a web project.
            It is interfaced with a MySQL database.

            Here are the features :
            <ul>
              <li>Read, post messages on topics</li>
              <li>Create topics</li>
              <li>Authorization procedure implementation</li>
              <li>Account customing service</li>
              <li>Administration page to have control over topics, messages and users</li>
            </ul>

            </p>

            <p><strong><a href="../../resources/forum.pdf" target="_blank">Download the report about this project</a></strong></p>

          </iron-collapse>
        </div>
      </paper-card>

      <paper-card heading="Numeric Table" elevation="2" image="../resources/numeric-table.jpg">
        <div class="card-actions">
          <paper-toggle-button checked="{{collapseNumericTable}}">See all</paper-toggle-button>
        </div>
        <div class="card-content">
          <h2>September 2015 - June 2015</h2>

          <p>Numeric table with RFID for the Laval Museum</p>

          <iron-collapse opened="{{collapseNumericTable}}">
            <p>In november 2016, the Laval Museum (CCSTI) is launching an exhibition about innovation in food proccessing industry,
            and wanted an interactive numeric table as a part of this event.
          </p>

            <paper-card image="../../resources/ccsti.png">
              <h4><a href="http://www.ccsti-laval.org/" target="_blank">See the CCSTI website</a></h4>
            </paper-card>

            <h3>The synopsis is quite simple :</h3>
            <ul>
              <li>The user have got in front of him a table with food, dishes, that seems to be an ordinary restaurant table</li>
              <li>He notices he can manipulate factice food on the table</li>
              <li>He put food onto his plate</li>
              <li>An animation, starting from the plate, is showing the industry steps that was necessary to become a comestible product</li>
            </ul>

            <h3>The showed data is :</h3>
            <ul>
              <li>What kind of processes the product underwent</li>
              <li>The distance runned between each processing step</li>
              <li>The carbon footprint</li>
              <li>Nutritional informations about the product</li>
            </ul>
            </p>

            <h4>The main goal of this project is to make the user concerned about the food he is consuming.</h4>

            <h3>How does it works</h3>
            The interaction with the table is designed to be as simple as possible. The original goal was to launch events
            when food is put onto the plate. We choose to use <strong>RFID</strong> for its simplicity and its small cost to implement.
            We ordered an <strong>Arduino</strong> board to pilot a RFID board. The board is connected by serial port to a
            computer running a Unity3D application we developed.

            <h3>Demonstration video</h3>

            <video width="100%" heigth="100%" controls>
              <source src="../../resources/ccsti.mp4" type="video/mp4">
            </video>

            <a href="../../resources/ccsti.pdf" target="_blank">Download the report about this project</a>


          </iron-collapse>
        </div>
      </paper-card>

      <paper-card elevation="2" image="../resources/immersion-nomade.png">
        <div class="card-actions">
          <paper-toggle-button checked="{{collapseImmersionNomade}}">See all</paper-toggle-button>
        </div>
        <div class="card-content">
          <h2>November 2014 - March 2015</h2>

          <p>Team Building VR application for Les Entrepreneuriales</p>

          <iron-collapse opened="{{collapseImmersionNomade}}">
            <p>In a entrepreneurial context, we developed a VR Team Buiding project as a proof of concept, using <strong>Unity3D, Kinect and Oculus Rift</strong></p>

            <h3>How does work the Team Building in this application ?</h3>

            <p>While a person is wearing an Oculus Rift, a other is tracked by the Kinect. The first person sees the second in a virtual environment, and items are
              falling from the sky. The goal is for the person who is seeing the scene to pilot the second person in order to catch the items, by voice commands
            </p>

          </iron-collapse>
        </div>
      </paper-card>

  </template>

  <script>

  Polymer({
    is: 'pf-projects',

    properties: {

    },

    openDialog: function(e){
      console.log(e.srcElement);
      console.log(e.srcElement.id);
      if(e.srcElement.id != undefined && e.srcElement.id != ''){
        this.$.pfDialog.open(e.srcElement.id);
      }

    }

  });

  </script>

</dom-module>
