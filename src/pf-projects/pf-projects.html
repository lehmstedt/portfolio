<dom-module id="pf-projects">

  <template>

  <style is="custom-style" include="iron-flex iron-flex-alignment">
    :host {
      display: block;
    }
  </style>

    <div class="vertical layout">

      <h1>Projects</h1>

      <paper-button raised on-tap="collapsePortfolio">
        PortFolio
        <iron-icon icon="arrow-drop-down"></iron-icon>
      </paper-button>

      <iron-collapse id="portfolioCollapse" opened>
        <h2>October 2016 - Now</h2>
      </iron-collapse>

      <paper-button raised on-tap="collapseMonCoachLegumes">
        The PortFolio project
        <iron-icon icon="arrow-drop-down"></iron-icon>
      </paper-button>

      <iron-collapse id="MonCoachLegumesCollapse">
        <h2>April 2016 - August 2016</h2>
      </iron-collapse>

      <paper-button raised on-tap="collapseForum">
        Forum
        <iron-icon icon="arrow-drop-down"></iron-icon>
      </paper-button>

      <iron-collapse id="forumCollapse">
        <h2>October 2015 - December 2015</h2>
      </iron-collapse>

      <paper-button raised on-tap="collapseNumericTable">
        Numeric Table
        <iron-icon icon="arrow-drop-down"></iron-icon>
      </paper-button>

      <iron-collapse id="numericTableCollapse">
        <h2>September 2015 - June 2015</h2>
      </iron-collapse>

      <paper-button raised on-tap="collapseImmersionNomade">
        Immersion Nomade
        <iron-icon icon="arrow-drop-down"></iron-icon>
      </paper-button>

      <iron-collapse id="immersionNomadeCollapse">
        <h2>November 2014 - March 2015</h2>
      </iron-collapse>

    </div>


  </template>

  <script>

  Polymer({
    is: 'pf-projects',

    properties: {

    },

    collapsePortfolio: function(){
      this.$.portfolioCollapse.toggle();
    },

    collapseMonCoachLegumes: function(){
      this.$.MonCoachLegumesCollapse.toggle();
    },

    collapseForum: function(){
      this.$.forumCollapse.toggle();
    },

    collapseNumericTable: function(){
      this.$.numericTableCollapse.toggle();
    },

    collapseImmersionNomade: function(){
      this.$.immersionNomadeCollapse.toggle();
    },
  });

  </script>

</dom-module>
